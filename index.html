<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TackRoom</title>
<style>
  :root { --green:#1B3D2C; --tan:#C4874F; --cream:#F5F0E8; --dark:#1A1A1A; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; background:var(--cream); color:var(--dark); line-height:1.55; min-height:100vh; display:flex; flex-direction:column; }
  header { background:var(--green); color:#fff; padding:44px 24px; text-align:center; }
  header h1 { margin:0; font-size:32px; }
  header p { margin:8px 0 0; opacity:.85; }
  main { max-width:560px; margin:0 auto; padding:28px 24px; flex:1; }
  a.card { display:block; background:#fff; padding:18px 22px; border-radius:10px; margin:12px 0; text-decoration:none; color:var(--dark); border:1px solid transparent; }
  a.card:hover { border-color:var(--tan); }
  a.card strong { color:var(--green); }
  footer { text-align:center; padding:20px; color:#888; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>TackRoom</h1>
  <p>The New Zealand horse tack marketplace</p>
</header>
<main>
  <a class="card" href="privacy.html"><strong>Privacy Policy →</strong></a>
  <a class="card" href="terms.html"><strong>Terms of Service →</strong></a>
  <a class="card" href="support.html"><strong>Support →</strong></a>
</main>
<footer>© TackRoom 2026</footer>
</body>
</html>
