<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TackRoom — Reset Your Password</title>
<style>
  :root { --green:#1B3D2C; --tan:#C4874F; --cream:#F5F0E8; --dark:#1A1A1A; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; background:var(--cream); color:var(--dark); line-height:1.55; min-height:100vh; display:flex; flex-direction:column; }
  header { background:var(--green); color:#fff; padding:44px 24px; text-align:center; }
  header h1 { margin:0; font-size:26px; }
  main { max-width:520px; margin:0 auto; padding:32px 24px; flex:1; width:100%; }
  .card { background:#fff; border-radius:12px; padding:28px 24px; box-shadow:0 2px 10px rgba(0,0,0,.05); text-align:center; }
  .key { width:72px; height:72px; margin:0 auto 16px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:700; }
  h2 { color:var(--green); margin:0 0 10px; font-size:22px; }
  p { color:#555; margin:10px 0; }
  .cta { display:inline-block; margin-top:18px; background:var(--green); color:#fff; padding:14px 28px; border-radius:10px; text-decoration:none; font-weight:600; }
  .cta:hover { background:#14301f; }
  .hint { font-size:13px; color:#888; margin-top:14px; }
  footer { text-align:center; padding:20px; color:#888; font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>TackRoom</h1>
</header>
<main>
  <div class="card">
    <div class="key">&#128273;</div>
    <h2>Reset your password</h2>
    <p>Opening TackRoom so you can set a new password&hellip;</p>
    <p class="hint">If the app doesn&rsquo;t open automatically, tap the button below.</p>
    <a id="openApp" class="cta" href="#">Open TackRoom</a>
    <p class="hint">Don&rsquo;t have TackRoom installed? Download it from the App Store first, then tap the link in the email again.</p>
  </div>
</main>
<footer>&copy; TackRoom 2026</footer>
<script>
  // Supabase sends tokens in the URL hash fragment (#access_token=...&refresh_token=...&type=recovery).
  // Forward the fragment untouched to the custom tackroom:// scheme so the iOS app
  // can complete the PKCE/recovery session exchange.
  var fragment = window.location.hash || '';
  var deepLink = 'tackroom://reset-password' + fragment;
  document.getElementById('openApp').setAttribute('href', deepLink);
  // Auto-bounce after a tiny delay so the browser has a chance to render.
  setTimeout(function () { window.location.href = deepLink; }, 400);
</script>
</body>
</html>
